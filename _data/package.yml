authors:
    - name: Anne Heyworth
    - name: Christopher D. Wensley
      url: http://pages.bangor.ac.uk/~mas023/

maintainers:
    - name: Christopher D. Wensley
      url: http://pages.bangor.ac.uk/~mas023/

GAP: ">=4.8.7"

needed-pkgs:
    - name: "xmod"
      version: ">= 2.59"
      url: "https://gap-packages.github.io/xmod/"
    - name: "GAPDoc"
      version: ">= 1.5.1"
